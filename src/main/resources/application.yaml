spring:
  application:
    name: tasker
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari: 
     maximum-pool-size: 10 
  jpa:
      show-sql: true
      hibernate:
        ddl-auto: validate # Flyway owns the schema — never use create/update 
      properties:
        hibernate:
          format_sql: true
          dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway: 
    enabled: true 
    locations: classpath:db/migration
  web:
    error:
      whitelabel:
        enabled: false
  mongodb:
    uri: mongodb://${MONGO_HOST:localhost}:27017/${MONGO_DB:tasker_audit}
  graphql: 
    graphiql: 
      enabled: true                # Disable in production 
    schema: 
     locations: classpath:graphql/ 
    websocket: 
     path: /graphql 
    http:
      path: /graphql



# ───────────────────────────────────────────────────────────────────────────── 
# src/main/resources/application-docker.yml 
# Active when SPRING_PROFILES_ACTIVE=docker (set in docker-compose) 
# ───────────────────────────────────────────────────────────────────────────── 

    #graphiql: 
      #enabled: false               # GraphiQL off in container deployments 


app:
  jwt: 
  secret: ${JWT_SECRET:change-me-in-production-use-32-chars-min} 
  expiry-ms: ${JWT_EXPIRY_MS:86400000}   # 24 h 

management: 
  endpoints: 
    web:
      exposure: 
        include: health, info, metrics


